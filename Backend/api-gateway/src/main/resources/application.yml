server:
  port: 8080

jwt:
  secret: "RkFrZVNlY3JldEZvckhTMjU2XzMyQnl0ZXNfISEhISEhISE="

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**,/api/brands/**,/api/categories/**,/api/admin/**

        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**,/api/admin/inventory/**

        - id: cart-service
          uri: http://localhost:8084
          predicates:
            - Path=/cart/**

        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/orders/**

        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/notifications/**